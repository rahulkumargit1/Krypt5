name: Build & Deploy Krypt5

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Setup Gradle Wrapper (fixes missing gradle-wrapper.jar)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. Grant execute permission to gradlew
      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # 5. Build the debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 6. Upload APK as artifact (so you can download it from GitHub Actions)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: krypt5-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build  # only runs if build succeeds

    # Only deploy on push to main/master (not on pull requests)
    if: github.event_name == 'push'

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. SSH into your EC2 server and run deploy commands
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          port: 22
          script: |
            echo "===== Deployment Started ====="
            cd ~/Krypt5 || git clone https://github.com/rahulkumargit1/Krypt5.git ~/Krypt5
            cd ~/Krypt5
            git pull origin main
            echo "===== Deployment Done ====="
